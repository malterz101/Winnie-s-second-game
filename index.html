<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Run & Play</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="theme-color" content="#FFB347" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Run & Play" />
<style>
  :root{
    --sky-top:#FFE6B0;
    --sky-horizon:#FF93A0;
    --grass-top:#9AD37E;
    --grass-bottom:#3F7A3F;
    --cream:#FFFBF2;
    --pink:#FF6FAE;
    --pink-dark:#E0408A;
    --gold:#FFB347;
    --ink:#3B2A20;
    --sky1:#FFE6B0;
    --sky2:#FFC79A;
    --sky3:#FF93A0;
  }

  * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin:0; padding:0; width:100%; height:100%;
    overflow:hidden; touch-action:none;
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--sky-top);
    -webkit-user-select:none; user-select:none;
  }

  #app{
    position:relative; width:100vw; height:100vh;
    display:flex; flex-direction:column; overflow:hidden;
  }

  /* ---------- status bar ---------- */
  #statusbar{
    position:relative; z-index:20;
    height:9vh; min-height:54px;
    display:flex; align-items:center; justify-content:space-between;
    padding: calc(env(safe-area-inset-top, 0px) + 6px) 16px 0 16px;
  }
  #hearts{ display:flex; gap:6px; }
  .heart{ width:26px; height:26px; transition: opacity .2s ease, transform .2s ease; }
  .heart.lost{ opacity:0.25; transform:scale(0.85); }
  #score{
    font-weight:800; font-size:19px; color:var(--ink);
    background:rgba(255,255,255,0.75); padding:5px 16px; border-radius:14px;
    box-shadow:0 2px 0 rgba(0,0,0,0.08);
  }

  /* ---------- stage ---------- */
  #stage{
    position:relative; flex:1; overflow:hidden;
    background: linear-gradient(to bottom,
      var(--sky1) 0%, var(--sky2) 30%, var(--sky3) 50%, var(--sky3) 58%,
      var(--grass-top) 58%, var(--grass-bottom) 100%);
  }

  #stars{
    position:absolute; top:0; left:0; width:100%; height:58%;
    z-index:0; pointer-events:none; opacity:0;
  }
  .star{
    position:absolute; border-radius:50%; background:#FFF8E0;
  }
  @media (prefers-reduced-motion: no-preference){
    .star{ animation: twinkle 3s ease-in-out infinite; }
  }
  @keyframes twinkle{ 0%,100%{ opacity:0.5; } 50%{ opacity:1; } }

  .moon{
    position:absolute; width:64px; height:64px; border-radius:50%;
    z-index:1; pointer-events:none; opacity:0;
    background: radial-gradient(circle at 38% 34%, #FFFDF0 0%, #F4ECCB 60%, #DCD2A8 100%);
    box-shadow: 0 0 22px 6px rgba(255,248,210,0.45);
  }
  .moon .crater{ position:absolute; border-radius:50%; background:rgba(180,170,130,0.45); }
  .moon .c-a{ width:14px; height:14px; top:18%; left:24%; }
  .moon .c-b{ width:9px; height:9px; top:52%; left:54%; }
  .moon .c-c{ width:7px; height:7px; top:30%; left:62%; }

  .sun-wrap{ position:absolute; top:4%; right:7%; width:96px; height:96px; z-index:1; }
  .sun-burst{
    position:absolute; inset:0; border-radius:50%;
    background: repeating-conic-gradient(rgba(255,196,110,0.4) 0deg 7deg, rgba(255,196,110,0) 7deg 23deg);
    animation: spinSlow 90s linear infinite;
  }
  .sun{
    position:absolute; top:28%; left:28%; width:44%; height:44%; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #FFF6DD 0%, #FFE48A 55%, var(--gold) 100%);
    box-shadow: 0 0 18px 5px rgba(255,196,110,0.5);
  }
  @keyframes spinSlow{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }

  .scroll-layer{ position:absolute; top:0; left:0; height:100%; width:100%; z-index:2; pointer-events:none; }
  .scroll-inner{ position:absolute; top:0; left:0; height:100%; will-change:transform; }
  #layerTrees, #layerBushes{ z-index:3; }
  #layerTrees .scroll-inner, #layerBushes .scroll-inner{ top:58%; height:42%; }
  .tile{ position:absolute; top:0; height:100%; }

  .hill{
    position:absolute; width:220px; height:90px; border-radius:50%;
  }
  .hill-a{ top:40%; background: radial-gradient(ellipse at 50% 100%, rgba(154,120,176,0.42), rgba(154,120,176,0) 72%); }
  .hill-b{ top:46%; background: radial-gradient(ellipse at 50% 100%, rgba(120,150,168,0.32), rgba(120,150,168,0) 72%); }

  .cloud{
    position:absolute; background: linear-gradient(to bottom, var(--cream), #FFE9CE); border-radius:50px;
    opacity:.92; width:64px; height:22px;
  }
  .cloud::before, .cloud::after{
    content:""; position:absolute; background:linear-gradient(to bottom, var(--cream), #FFE9CE); border-radius:50%;
  }
  .cloud::before{ width:32px; height:32px; top:-15px; left:8px; }
  .cloud::after{ width:24px; height:24px; top:-9px; left:34px; }

  .firefly{
    position:absolute; width:6px; height:6px; border-radius:50%;
    background: radial-gradient(circle, #FFF3D0 0%, #FFD56B 55%, rgba(255,213,107,0) 100%);
  }

  .flower{ position:absolute; width:16px; height:16px; }
  .flower::before, .flower::after, .flower i{
    content:""; position:absolute; width:7px; height:7px; border-radius:50%;
    background: var(--petal-color, #FF8FC0);
  }
  .flower::before{ top:0; left:4.5px; }
  .flower::after{ top:4.5px; left:0; }
  .flower i{ display:block; position:absolute; }
  .flower i:nth-child(1){ top:4.5px; left:9px; }
  .flower i:nth-child(2){ top:9px; left:4.5px; }
  .flower b{
    display:block; position:absolute; top:4.5px; left:4.5px; width:6px; height:6px;
    border-radius:50%; background:#FFE48A;
  }

  .tree{ position:absolute; top:0; width:0; height:80px; transform-origin: bottom center; }
  .tree .trunk{
    position:absolute; bottom:0; left:50%; margin-left:-7px;
    width:14px; height:40px; border-radius:6px;
    background: linear-gradient(to right, #9A6B3F, #C28A52);
  }
  .tree .canopy{
    position:absolute; bottom:30px; left:50%; border-radius:50%;
  }
  .tree .c1{ width:62px; height:58px; margin-left:-31px; bottom:30px; background: radial-gradient(circle at 38% 32%, #8FD17A, #4E9B58); }
  .tree .c2{ width:44px; height:42px; margin-left:-46px; bottom:50px; background: radial-gradient(circle at 38% 32%, #9AD884, #58A862); }
  .tree .c3{ width:44px; height:42px; margin-left:2px; bottom:50px; background: radial-gradient(circle at 38% 32%, #9AD884, #58A862); }

  .bush{
    position:absolute; top:0; width:70px; height:34px; border-radius:34px 34px 0 0;
    background: radial-gradient(ellipse at 40% 30%, #9AD884, #4E9B58);
    transform-origin: bottom center;
  }
  .bush::before, .bush::after{
    content:""; position:absolute; bottom:0; border-radius:50%;
    background: radial-gradient(ellipse at 40% 30%, #9AD884, #4E9B58);
  }
  .bush::before{ width:34px; height:30px; left:-12px; }
  .bush::after{ width:30px; height:26px; right:-10px; }

  .butterfly{ position:absolute; width:18px; height:14px; }
  .butterfly .wing{
    position:absolute; top:0; width:9px; height:14px; border-radius:60% 60% 50% 50%;
    background: var(--bfly, #FF8FC0);
  }
  .butterfly .wing.l{ left:0; transform-origin:right center; animation: flutterL 0.28s ease-in-out infinite; }
  .butterfly .wing.r{ right:0; transform-origin:left center; animation: flutterR 0.28s ease-in-out infinite; }
  @keyframes flutterL{ 0%,100%{ transform: rotateY(0deg); } 50%{ transform: rotateY(60deg); } }
  @keyframes flutterR{ 0%,100%{ transform: rotateY(0deg); } 50%{ transform: rotateY(-60deg); } }

  #ground-line, #air-line{ position:absolute; left:0; width:100%; height:0; z-index:5; }
  #ground-line{ top:58%; }
  #air-line{ top:34%; }

  /* ---------- player ---------- */
  #player{
    position:absolute; left:14%; top:calc(58% - 24vh); z-index:6;
    height:24vh; width:30vh;
  }

  .player-shadow{
    position:absolute; bottom:-3px; left:8%; width:78%; height:12px; border-radius:50%;
    background: radial-gradient(ellipse, rgba(60,40,20,0.3), rgba(60,40,20,0) 75%);
    z-index:1;
  }

  .dog-rig{ position:absolute; left:12%; bottom:0; height:56%; aspect-ratio: 294 / 413; z-index:5; }
  .dog-bob{ position:relative; width:100%; height:100%; transform: scaleX(-1); transform-origin:50% 100%; }
  .dog-upper{ position:absolute; left:0; bottom:24.6%; width:100%; height:auto; display:block; z-index:2; }
  .dog-leg{ position:absolute; left:0; bottom:0; width:100%; height:auto; display:block; z-index:1; transform-origin:50% 8%; }

  .girl-rig{ position:absolute; left:0; bottom:0; height:100%; z-index:4; }
  .girl-body-bob{ position:relative; width:auto; height:100%; }
  .girl-stack{ position:relative; height:100%; aspect-ratio: 104 / 260; }
  .girl-upper{ position:absolute; left:0; bottom:19.6%; display:block; width:100%; height:auto; z-index:2; }
  .girl-leg{ position:absolute; left:0; bottom:0; width:100%; height:auto; display:block; z-index:1; transform-origin:50% 6%; }

  /* crouch: legs compress (knees fold), torso drops to meet them, feet stay planted */
  #player .girl-upper, #player .girl-leg, #player .dog-upper, #player .dog-leg{
    transition: transform 0.14s ease;
  }
  #player.crouching .girl-leg{ transform: scaleY(0.6); transform-origin:50% 100%; }
  #player.crouching .girl-upper{ transform: translateY(42%) scaleY(0.9); transform-origin:50% 100%; }
  #player.crouching .dog-leg{ transform: scaleY(0.7); transform-origin:50% 100%; }
  #player.crouching .dog-upper{ transform: translateY(22%) scaleY(0.94); transform-origin:50% 100%; }

  #player.hit .player-visual{ animation: hitShake 0.35s ease; }
  .player-visual{ position:relative; width:100%; height:100%; }
  #player.hit .girl-upper, #player.hit .girl-leg, #player.hit .dog-upper, #player.hit .dog-leg{ filter: saturate(0.4) brightness(1.15); }
  @keyframes hitShake{
    0%,100%{ transform: translateX(0); }
    20%{ transform: translateX(-6px) rotate(-3deg); }
    40%{ transform: translateX(5px) rotate(2deg); }
    60%{ transform: translateX(-4px) rotate(-2deg); }
    80%{ transform: translateX(3px) rotate(1deg); }
  }

  /* ---------- obstacles ---------- */
  .obstacle{
    position:absolute; left:0; top:0;
    will-change: transform;
  }
  .ball-spin{
    width:100%; height:100%;
    animation: spinBall 0.5s linear infinite;
  }
  .ball-spin svg{ width:100%; height:100%; display:block; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.25)); }
  @keyframes spinBall{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
  .obstacle.flying .ball-spin{ animation-duration: 0.9s; }

  .sparkle{
    position:fixed; pointer-events:none; z-index:80; border-radius:50%;
  }
  .sparkle.pop{ animation: sparklePop .6s ease forwards; }
  @keyframes sparklePop{
    0%{ transform: translate(0,0) scale(0.4); opacity:1; }
    60%{ transform: translate(var(--dx), var(--dy)) scale(1.05); opacity:1; }
    100%{ transform: translate(var(--dx), calc(var(--dy) - 14px)) scale(0.5); opacity:0; }
  }

  /* ---------- overlays ---------- */
  .overlay{
    position:absolute; inset:0; z-index:60;
    background: rgba(255,230,176,0.94);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding: 24px;
    gap:14px;
  }
  .overlay.hidden{ display:none; }
  .overlay h1{
    margin:0; font-size:26px; color:var(--pink-dark); font-weight:800;
  }
  .overlay p{ margin:0; font-size:15px; color:var(--ink); max-width:280px; line-height:1.5; }
  .instructions-row{ display:flex; gap:18px; margin: 4px 0; }
  .instruction{ display:flex; flex-direction:column; align-items:center; gap:6px; font-size:13px; color:var(--ink); font-weight:600; }
  .instruction-icon{
    width:54px; height:54px; border-radius:16px; background:rgba(255,255,255,0.8);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 0 rgba(0,0,0,0.08);
  }
  .overlay-chars{ display:flex; align-items:flex-end; justify-content:center; gap:8px; height:120px; }
  .overlay-chars img{ display:block; cursor:pointer; transform-origin:50% 100%; }
  .overlay-chars img.boing{ animation: boing 0.6s cubic-bezier(.34,1.56,.64,1); }
  @keyframes boing{
    0%{ transform: translateY(0) scale(1,1) rotate(0deg); }
    25%{ transform: translateY(-18px) scale(0.92,1.12) rotate(-4deg); }
    45%{ transform: translateY(0) scale(1.1,0.88) rotate(3deg); }
    65%{ transform: translateY(-7px) scale(0.97,1.04) rotate(-2deg); }
    100%{ transform: translateY(0) scale(1,1) rotate(0deg); }
  }
  .big-button{
    border:none; border-radius:26px; background:var(--cream);
    box-shadow: 0 0 0 3px var(--gold), 0 4px 0 rgba(0,0,0,0.08);
    color:var(--pink-dark); font-weight:800; font-size:18px;
    padding:14px 36px; margin-top:6px;
  }
  #scoreRecap{ font-size:18px; font-weight:800; color:var(--pink-dark); }
</style>
</head>

<script>
(function(){
  "use strict";

  var stage = document.getElementById('stage');
  var player = document.getElementById('player');
  var groundLine = document.getElementById('ground-line');
  var airLine = document.getElementById('air-line');
  var scoreEl = document.getElementById('score');
  var hearts = Array.prototype.slice.call(document.querySelectorAll('.heart'));
  var startOverlay = document.getElementById('startOverlay');
  var overOverlay = document.getElementById('overOverlay');
  var startBtn = document.getElementById('startBtn');
  var retryBtn = document.getElementById('retryBtn');
  var scoreRecap = document.getElementById('scoreRecap');
  var startGirl = document.getElementById('startGirl');
  var startDog = document.getElementById('startDog');

  var layerHillsInner = document.getElementById('layerHillsInner');
  var layerCloudsInner = document.getElementById('layerCloudsInner');
  var layerTreesInner = document.getElementById('layerTreesInner');
  var layerButterfliesInner = document.getElementById('layerButterfliesInner');
  var layerFirefliesInner = document.getElementById('layerFirefliesInner');
  var layerBushesInner = document.getElementById('layerBushesInner');
  var layerFlowersInner = document.getElementById('layerFlowersInner');

  var girlBodyBob = document.querySelector('.girl-body-bob');
  var girlLegBack = document.querySelector('.girl-leg-back');
  var girlLegFront = document.querySelector('.girl-leg-front');
  var dogLegBack = document.querySelector('.dog-leg-back');
  var dogLegFront = document.querySelector('.dog-leg-front');

  var WALK_FRACTION = 0.44;
  var RUN_FRACTION = 0.66;
  var RAMP_MS = 22000;
  var CREEP_PER_SEC = 0.006;
  var MAX_FRACTION = 1.15;
  var WALK_DURATION = 0.52;
  var RUN_DURATION = 0.34;
  var BALL_SIZE = 52;
  var COLLISION_RADIUS = 30;
  var DUCK_DURATION_MS = 700;
  var INVULN_MS = 800;

  var state = {
    running:false,
    speed:0,
    elapsed:0,
    score:0,
    heartsLeft:3,
    obstacles:[],
    spawnAt:0,
    jumping:false,
    ducking:false,
    invulnerable:false,
    playerCenterX:0,
    stageW:0,
    stageH:0,
    scrollOffsets:{ hills:0, clouds:0, trees:0, butterflies:0, fireflies:0, bushes:0, flowers:0 },
    runPhase:0,
    currentRunDuration: 0.95,
    duckTimer: null,
    duckCleared: false
  };

  var audioCtx = null;
  function ensureAudio(){
    if (!audioCtx){
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playTone(freq, dur, delay, vol, type){
    if (!audioCtx) return;
    dur = dur || 0.18; delay = delay || 0; vol = vol || 0.22; type = type || 'sine';
    var t = audioCtx.currentTime + delay;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + dur + 0.03);
  }
  function playSweep(f1, f2, dur, vol, type){
    if (!audioCtx) return;
    var t = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(f1, t);
    osc.frequency.exponentialRampToValueAtTime(f2, t + dur);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.linearRampToValueAtTime(vol || 0.25, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + dur + 0.03);
  }
  function playJumpSound(){ playSweep(320, 620, 0.18, 0.22, 'triangle'); }
  function playDuckSound(){ playSweep(260, 130, 0.16, 0.2, 'sine'); }
  function playHitSound(){
    playTone(180, 0.2, 0, 0.28, 'sawtooth');
    playTone(140, 0.22, 0.04, 0.22, 'sawtooth');
  }
  function playAvoidTick(){ playTone(880, 0.08, 0, 0.14, 'sine'); }
  function playMilestoneFanfare(){
    playTone(523.25, 0.13, 0);
    playTone(659.25, 0.13, 0.1);
    playTone(784.0, 0.22, 0.2);
  }
  function woofOnce(delay){
    if (!audioCtx) return;
    var t = audioCtx.currentTime + delay;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(340, t);
    osc.frequency.exponentialRampToValueAtTime(150, t + 0.11);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.linearRampToValueAtTime(0.3, t + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.18);
  }
  function playWoof(){ woofOnce(0); woofOnce(0.2); }

  function jitter(range){ return (Math.random()*2-1)*range; }

  function buildScrollLayers(){
    var w = state.stageW;
    var inners = [layerHillsInner, layerCloudsInner, layerTreesInner, layerButterfliesInner,
                  layerFirefliesInner, layerBushesInner, layerFlowersInner];
    inners.forEach(function(inner){
      inner.innerHTML = '';
      inner.style.width = (w*2) + 'px';
    });

    function addTiles(inner, builder){
      for (var i=0;i<2;i++){
        var tile = document.createElement('div');
        tile.className = 'tile';
        tile.style.left = (i*w) + 'px';
        tile.style.width = w + 'px';
        builder(tile);
        inner.appendChild(tile);
      }
    }

    addTiles(layerHillsInner, function(tile){
      var a = document.createElement('div'); a.className='hill hill-a'; a.style.left='8%';
      var b = document.createElement('div'); b.className='hill hill-b'; b.style.left='55%';
      tile.appendChild(a); tile.appendChild(b);
    });

    addTiles(layerCloudsInner, function(tile){
      [['10%','9%'],['58%','15%'],['82%','6%']].forEach(function(pos){
        var c = document.createElement('div');
        c.className='cloud'; c.style.left=pos[0]; c.style.top=pos[1];
        tile.appendChild(c);
      });
    });

    addTiles(layerTreesInner, function(tile){
      [['12%',1.0],['68%',0.82]].forEach(function(p){
        var tr = document.createElement('div');
        tr.className='tree';
        tr.style.left = p[0];
        tr.style.transform = 'translateY(-80px) scale(' + p[1] + ')';
        tr.style.transformOrigin = 'bottom center';
        tr.innerHTML = '<div class="canopy c2"></div><div class="canopy c3"></div><div class="canopy c1"></div><div class="trunk"></div>';
        tile.appendChild(tr);
      });
    });

    addTiles(layerButterfliesInner, function(tile){
      [['30%','22%','#FF8FC0'],['74%','30%','#FFD66B']].forEach(function(p){
        var bf = document.createElement('div');
        bf.className='butterfly';
        bf.style.left=p[0]; bf.style.top=p[1];
        bf.style.setProperty('--bfly', p[2]);
        bf.innerHTML = '<div class="wing l"></div><div class="wing r"></div>';
        tile.appendChild(bf);
      });
    });

    addTiles(layerFirefliesInner, function(tile){
      var spots = [['14%','18%'],['40%','10%'],['66%','28%'],['86%','16%']];
      spots.forEach(function(p){
        var f = document.createElement('div');
        f.className='firefly'; f.style.left=p[0]; f.style.top=p[1];
        tile.appendChild(f);
      });
    });

    addTiles(layerBushesInner, function(tile){
      [['4%',0.9],['38%',1.0],['82%',0.85]].forEach(function(p){
        var bu = document.createElement('div');
        bu.className='bush';
        bu.style.left=p[0];
        bu.style.transform='translateY(-34px) scale('+p[1]+')';
        bu.style.transformOrigin='bottom center';
        tile.appendChild(bu);
      });
    });

    addTiles(layerFlowersInner, function(tile){
      var spots = [['6%','#FF8FC0'],['28%','#FFD66B'],['52%','#FF8FC0'],['78%','#FFD66B'],['92%','#FF8FC0']];
      spots.forEach(function(p){
        var fl = document.createElement('div');
        fl.className='flower';
        fl.style.left = p[0];
        fl.style.bottom = (4 + Math.random()*6) + '%';
        fl.style.setProperty('--petal-color', p[1]);
        fl.innerHTML = '<i></i><i></i><b></b>';
        tile.appendChild(fl);
      });
    });
  }

  function updateScrollLayers(dt){
    var w = state.stageW;
    var factors = { hills:0.18, clouds:0.30, trees:0.62, butterflies:0.5, fireflies:0.5, bushes:0.82, flowers:1.0 };
    var layers = {
      hills: layerHillsInner, clouds: layerCloudsInner, trees: layerTreesInner,
      butterflies: layerButterfliesInner, fireflies: layerFirefliesInner,
      bushes: layerBushesInner, flowers: layerFlowersInner
    };
    Object.keys(factors).forEach(function(key){
      if (state.scrollOffsets[key] === undefined) state.scrollOffsets[key] = 0;
      var off = state.scrollOffsets[key] + state.speed * factors[key] * dt;
      off = off % w;
      state.scrollOffsets[key] = off;
      layers[key].style.transform = 'translateX(' + (-off) + 'px)';
    });
  }

  function measureStage(){
    var rect = stage.getBoundingClientRect();
    state.stageW = rect.width;
    state.stageH = rect.height;
    var girlRig = document.querySelector('.girl-rig');
    var dogRig = document.querySelector('.dog-rig');
    var centers = [];
    if (girlRig){
      var gRect = girlRig.getBoundingClientRect();
      centers.push((gRect.left - rect.left) + gRect.width/2);
    }
    if (dogRig){
      var dRect = dogRig.getBoundingClientRect();
      centers.push((dRect.left - rect.left) + dRect.width/2);
    }
    if (centers.length){
      // use the midpoint of the pair so obstacles resolve as they reach the duo together
      var sum = centers.reduce(function(a,b){ return a+b; }, 0);
      state.playerCenterX = sum / centers.length;
    } else {
      var pRect = player.getBoundingClientRect();
      state.playerCenterX = (pRect.left - rect.left) + pRect.width/2;
    }
  }

  var SOCCER_SVG = '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">' +
    '<defs><radialGradient id="bgg" cx="38%" cy="32%" r="70%">' +
    '<stop offset="0%" stop-color="#ffffff"/><stop offset="78%" stop-color="#f2f2f2"/>' +
    '<stop offset="100%" stop-color="#d8d8d8"/></radialGradient></defs>' +
    '<circle cx="50" cy="50" r="47" fill="url(#bgg)" stroke="#cfcfcf" stroke-width="1.5"/>' +
    '<polygon points="50,30 64,40 59,57 41,57 36,40" fill="#222"/>' +
    '<polygon points="50,8 58,20 50,28 42,20" fill="#222"/>' +
    '<polygon points="86,38 80,52 68,46 71,33" fill="#222"/>' +
    '<polygon points="70,82 57,76 62,62 76,66" fill="#222"/>' +
    '<polygon points="30,82 24,68 38,62 43,76" fill="#222"/>' +
    '<polygon points="14,38 29,33 32,46 20,52" fill="#222"/>' +
    '<g stroke="#3a3a3a" stroke-width="1.4" fill="none" opacity="0.55">' +
    '<line x1="50" y1="28" x2="50" y2="8"/><line x1="64" y1="40" x2="80" y2="38"/>' +
    '<line x1="59" y1="57" x2="68" y2="70"/><line x1="41" y1="57" x2="32" y2="70"/>' +
    '<line x1="36" y1="40" x2="20" y2="38"/></g></svg>';

  function spawnObstacle(){
    var type = Math.random() < 0.5 ? 'rolling' : 'flying';
    var el = document.createElement('div');
    el.className = 'obstacle' + (type === 'flying' ? ' flying' : '');
    el.style.width = BALL_SIZE + 'px';
    el.style.height = BALL_SIZE + 'px';

    var spin = document.createElement('div');
    spin.className = 'ball-spin';
    spin.innerHTML = SOCCER_SVG;
    el.appendChild(spin);

    el.style.position = 'absolute';
    el.style.left = '0px';

    if (type === 'rolling'){
      el.style.top = 'auto';
      el.style.bottom = '0px';
      groundLine.appendChild(el);
    } else {
      el.style.top = (-BALL_SIZE/2) + 'px';
      airLine.appendChild(el);
    }

    var x = state.stageW + BALL_SIZE;
    el.style.transform = 'translateX(' + x + 'px)';

    state.obstacles.push({ el:el, type:type, x:x, size:BALL_SIZE, resolved:false });
  }

  function spawnSparkles(clientX, clientY, hues){
    hues = hues || ['#FFD66B', '#FF8FC0', '#FFFFFF'];
    for (var i=0;i<7;i++){
      var s = document.createElement('div');
      s.className = 'sparkle';
      var size = 5 + Math.random()*6;
      s.style.width = size+'px'; s.style.height = size+'px';
      s.style.left = (clientX - size/2) + 'px';
      s.style.top = (clientY - size/2) + 'px';
      s.style.background = hues[i % hues.length];
      var dx = jitter(40)+'px';
      var dy = (-20 - Math.random()*24)+'px';
      s.style.setProperty('--dx', dx);
      s.style.setProperty('--dy', dy);
      document.body.appendChild(s);
      requestAnimationFrame(function(el){ return function(){ el.classList.add('pop'); }; }(s));
      setTimeout(function(el){ return function(){ if (el.parentNode) el.parentNode.removeChild(el); }; }(s), 650);
    }
  }

  function onAvoid(obstacle){
    state.score += 1;
    scoreEl.textContent = String(state.score);
    var rect = obstacle.el.getBoundingClientRect();
    spawnSparkles(rect.left + rect.width/2, rect.top + rect.height/2);
    if (state.score % 10 === 0){
      playMilestoneFanfare();
    } else {
      playAvoidTick();
    }
  }

  function onHit(){
    if (state.invulnerable) return;
    state.invulnerable = true;
    state.heartsLeft -= 1;
    var idx = 3 - state.heartsLeft - 1;
    if (idx >= 0 && idx < hearts.length) hearts[idx].classList.add('lost');
    playHitSound();
    player.classList.add('hit');
    setTimeout(function(){ player.classList.remove('hit'); }, 350);
    setTimeout(function(){ state.invulnerable = false; }, INVULN_MS);
    if (state.heartsLeft <= 0){
      endGame();
    }
  }

  function updateObstacles(dt){
    for (var i = state.obstacles.length - 1; i >= 0; i--){
      var o = state.obstacles[i];
      o.x -= state.speed * dt;
      o.el.style.transform = 'translateX(' + o.x + 'px)';

      if (!o.resolved){
        var centerX = o.x + o.size/2;
        if (Math.abs(centerX - state.playerCenterX) < COLLISION_RADIUS){
          o.resolved = true;
          var avoided = (o.type === 'rolling' && state.jumping) || (o.type === 'flying' && state.ducking);
          if (avoided){ onAvoid(o); } else { onHit(); }
        }
      }

      if (o.x < -o.size - 30){
        if (o.el.parentNode) o.el.parentNode.removeChild(o.el);
        state.obstacles.splice(i, 1);
      }
    }
  }

  function updateSpeed(){
    var progress = Math.min(1, state.elapsed / RAMP_MS);
    var walk = state.stageW * WALK_FRACTION;
    var run = state.stageW * RUN_FRACTION;
    var base = walk + (run - walk) * progress;

    // after the initial ramp, keep creeping faster (unbounded time) up to a hard ceiling
    var extraSeconds = Math.max(0, (state.elapsed - RAMP_MS) / 1000);
    var creep = state.stageW * CREEP_PER_SEC * extraSeconds;
    var ceiling = state.stageW * MAX_FRACTION;
    state.speed = Math.min(base + creep, ceiling);

    // tie the leg-cycle tempo to actual speed so the stride keeps pace as it climbs
    var speedFrac = state.speed / state.stageW;
    var sp = Math.min(1, (speedFrac - WALK_FRACTION) / (MAX_FRACTION - WALK_FRACTION));
    state.currentRunDuration = WALK_DURATION + (RUN_DURATION - WALK_DURATION) * sp;
  }

  function updateRunCycle(dt){
    if (state.jumping) return;

    if (state.ducking){
      // hand leg control to the crouch CSS (bent legs); clear inline run transforms once
      if (!state.duckCleared){
        if (girlLegFront) girlLegFront.style.transform = '';
        if (girlLegBack) girlLegBack.style.transform = '';
        if (dogLegFront) dogLegFront.style.transform = '';
        if (dogLegBack) dogLegBack.style.transform = '';
        if (girlBodyBob) girlBodyBob.style.transform = '';
        state.duckCleared = true;
      }
      return;
    }
    state.duckCleared = false;

    state.runPhase += dt / state.currentRunDuration;
    if (state.runPhase > 100000) state.runPhase = state.runPhase % 1;
    var t = (state.runPhase % 1) * Math.PI * 2;

    // legs swing in opposite phase; amplitude grows a touch as they speed up
    var progress = Math.min(1, state.elapsed / RAMP_MS);
    var amp = 18 + progress * 10;
    var swing = Math.sin(t) * amp;

    // vertical bob peaks twice per stride (both feet push off)
    var bob = -Math.abs(Math.sin(t)) * (4 + progress * 3);

    if (girlLegFront) girlLegFront.style.transform = 'rotate(' + swing.toFixed(2) + 'deg)';
    if (girlLegBack) girlLegBack.style.transform = 'rotate(' + (-swing).toFixed(2) + 'deg)';
    if (girlBodyBob) girlBodyBob.style.transform = 'translateY(' + bob.toFixed(2) + 'px)';
    if (dogLegFront) dogLegFront.style.transform = 'rotate(' + swing.toFixed(2) + 'deg)';
    if (dogLegBack) dogLegBack.style.transform = 'rotate(' + (-swing).toFixed(2) + 'deg)';
  }

  function updateSpawning(dt, now){
    if (now < state.spawnAt) return;
    spawnObstacle();
    // base gap on the distance the ball must travel vs current speed, so spacing
    // stays fair but keeps tightening as speed climbs past the initial ramp
    var gapDistance = state.stageW * 0.62;
    var base = (gapDistance / state.speed) * 1000;
    base = Math.max(620, base);
    state.spawnAt = now + base + jitter(base * 0.22);
  }

  function doJump(){
    if (!state.running || state.jumping) return;
    if (state.ducking){ endDuck(); }   // interrupt a duck to leap
    state.jumping = true;
    player.classList.add('jumping');
    playJumpSound();
    var startTime = performance.now();
    var duration = 560;
    var height = state.stageH * 0.17;
    function step(now){
      if (!state.jumping || !state.running){
        // interrupted (e.g. by a duck) or game ended: stop driving transforms
        player.style.transform = '';
        if (girlBodyBob) girlBodyBob.style.transform = '';
        player.classList.remove('jumping');
        return;
      }
      var p = Math.min(1, (now - startTime) / duration);
      var y = -height * 4 * p * (1 - p);
      player.style.transform = 'translateY(' + y + 'px)';

      // tuck legs up at the apex, extend on landing
      var tuck = Math.sin(p * Math.PI);
      var legAngle = tuck * 38;
      if (girlLegFront) girlLegFront.style.transform = 'rotate(' + legAngle.toFixed(1) + 'deg)';
      if (girlLegBack) girlLegBack.style.transform = 'rotate(' + (legAngle*0.7).toFixed(1) + 'deg)';
      if (dogLegFront) dogLegFront.style.transform = 'rotate(' + legAngle.toFixed(1) + 'deg)';
      if (dogLegBack) dogLegBack.style.transform = 'rotate(' + (legAngle*0.7).toFixed(1) + 'deg)';
      if (girlBodyBob) girlBodyBob.style.transform = 'translateY(' + (-tuck*4).toFixed(1) + 'px) rotate(' + (tuck*4).toFixed(1) + 'deg)';

      if (p < 1){
        requestAnimationFrame(step);
      } else {
        player.style.transform = '';
        if (girlBodyBob) girlBodyBob.style.transform = '';
        state.jumping = false;
        player.classList.remove('jumping');
      }
    }
    requestAnimationFrame(step);
  }

  function startDuck(){
    if (!state.running || state.ducking) return;
    if (state.jumping){
      // interrupt a jump: cancel it and snap to ground so the crouch reads cleanly
      state.jumping = false;
      player.classList.remove('jumping');
      player.style.transform = '';
      if (girlBodyBob) girlBodyBob.style.transform = '';
      if (girlLegFront) girlLegFront.style.transform = '';
      if (girlLegBack) girlLegBack.style.transform = '';
      if (dogLegFront) dogLegFront.style.transform = '';
      if (dogLegBack) dogLegBack.style.transform = '';
    }
    state.ducking = true;
    state.duckCleared = false;
    player.classList.add('crouching');
    playDuckSound();
    clearTimeout(state.duckTimer);
    state.duckTimer = setTimeout(endDuck, DUCK_DURATION_MS);
  }
  function endDuck(){
    if (!state.ducking) return;
    state.ducking = false;
    player.classList.remove('crouching');
  }

  var lastTime = null;
  function loop(now){
    if (!state.running) return;
    if (lastTime === null) lastTime = now;
    var dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    state.elapsed += dt * 1000;

    updateSpeed();
    updateRunCycle(dt);
    updateScrollLayers(dt);
    updateSpawning(dt, now);
    updateObstacles(dt);

    requestAnimationFrame(loop);
  }

  function clearObstacles(){
    state.obstacles.forEach(function(o){ if (o.el.parentNode) o.el.parentNode.removeChild(o.el); });
    state.obstacles = [];
  }

  function startGame(){
    ensureAudio();
    measureStage();
    buildScrollLayers();
    clearObstacles();
    state.running = true;
    state.speed = state.stageW * WALK_FRACTION;
    state.elapsed = 0;
    state.score = 0;
    state.heartsLeft = 3;
    state.jumping = false;
    state.ducking = false;
    clearTimeout(state.duckTimer);
    state.invulnerable = false;
    state.spawnAt = performance.now() + 1400;
    state.runPhase = 0;
    state.currentRunDuration = WALK_DURATION;
    hearts.forEach(function(h){ h.classList.remove('lost'); });
    scoreEl.textContent = '0';
    player.classList.remove('jumping','crouching','hit');
    player.style.transform = '';
    startOverlay.classList.add('hidden');
    overOverlay.classList.add('hidden');
    lastTime = null;
    requestAnimationFrame(loop);
  }

  function endGame(){
    state.running = false;
    scoreRecap.textContent = 'You dodged ' + state.score + ' ball' + (state.score===1?'':'s');
    overOverlay.classList.remove('hidden');
  }

  startBtn.addEventListener('click', startGame);
  retryBtn.addEventListener('click', startGame);

  function boingChar(el){
    el.classList.remove('boing');
    void el.offsetWidth;
    el.classList.add('boing');
    var r = el.getBoundingClientRect();
    spawnSparkles(r.left + r.width/2, r.top + r.height*0.4);
    setTimeout(function(){ el.classList.remove('boing'); }, 650);
  }
  startGirl.addEventListener('click', function(){ ensureAudio(); playWoof(); boingChar(startGirl); boingChar(startDog); });
  startDog.addEventListener('click', function(){ ensureAudio(); playWoof(); boingChar(startDog); boingChar(startGirl); });

  var pointerStartX = 0, pointerStartY = 0, pointerStartT = 0, pointerActive = false;
  var SWIPE_THRESHOLD = 26;

  stage.addEventListener('pointerdown', function(e){
    if (!state.running) return;
    if (e.target.closest && e.target.closest('.overlay')) return;
    ensureAudio();
    pointerActive = true;
    pointerStartX = e.clientX;
    pointerStartY = e.clientY;
    pointerStartT = performance.now();
  });

  stage.addEventListener('pointerup', function(e){
    if (!state.running || !pointerActive) return;
    pointerActive = false;
    var dx = e.clientX - pointerStartX;
    var dy = e.clientY - pointerStartY;
    var absX = Math.abs(dx), absY = Math.abs(dy);

    if (absY > SWIPE_THRESHOLD && absY >= absX){
      if (dy < 0) doJump();
      else startDuck();
    } else if (absX < SWIPE_THRESHOLD && absY < SWIPE_THRESHOLD){
      // small tap = jump (gentle fallback for little fingers)
      doJump();
    }
  });

  stage.addEventListener('pointercancel', function(){
    pointerActive = false;
  });

  document.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive:false });

  var resizeTimer = null;
  window.addEventListener('resize', function(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){
      measureStage();
      buildScrollLayers();
    }, 200);
  });

  /* ---------------- day / night cycle ---------------- */
  var rootStyle = document.documentElement.style;
  var moonEl = document.querySelector('.moon');
  var sunWrapEl = document.querySelector('.sun-wrap');
  var starsEl = document.getElementById('stars');
  var CYCLE_MS = 75000;

  // four key phases, evenly spaced around the cycle.
  // each: sky gradient stops [top, mid, horizon], sun opacity, moon opacity, star opacity
  var PHASES = [
    { // day
      sky: [[255,230,176],[255,199,154],[255,147,160]],
      sun:1, moon:0, stars:0
    },
    { // sunset (orange)
      sky: [[255,196,120],[255,142,92],[226,86,96]],
      sun:1, moon:0, stars:0.1
    },
    { // night (purple, never fully dark)
      sky: [[74,54,104],[96,66,128],[126,86,150]],
      sun:0, moon:1, stars:1
    },
    { // sunrise (soft warm)
      sky: [[255,210,150],[255,170,150],[240,150,170]],
      sun:1, moon:0, stars:0.1
    }
  ];

  function lerp(a, b, t){ return a + (b - a) * t; }
  function lerpRGB(c1, c2, t){
    return [Math.round(lerp(c1[0],c2[0],t)),
            Math.round(lerp(c1[1],c2[1],t)),
            Math.round(lerp(c1[2],c2[2],t))];
  }
  function rgb(c){ return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; }

  function buildStars(){
    if (!starsEl) return;
    starsEl.innerHTML = '';
    var n = 46;
    for (var i=0;i<n;i++){
      var s = document.createElement('div');
      s.className = 'star';
      var sz = 1 + Math.random()*2.2;
      s.style.width = sz + 'px';
      s.style.height = sz + 'px';
      s.style.left = (Math.random()*100) + '%';
      s.style.top = (Math.random()*92) + '%';
      s.style.animationDelay = '-' + (Math.random()*3).toFixed(2) + 's';
      starsEl.appendChild(s);
    }
  }

  function updateDayNight(now){
    var phase = (now % CYCLE_MS) / CYCLE_MS; // 0..1
    var scaled = phase * PHASES.length;      // 0..4
    var idx = Math.floor(scaled) % PHASES.length;
    var next = (idx + 1) % PHASES.length;
    var t = scaled - Math.floor(scaled);
    // ease for smoother transitions
    var et = t * t * (3 - 2 * t);

    var A = PHASES[idx], B = PHASES[next];
    var sky1 = lerpRGB(A.sky[0], B.sky[0], et);
    var sky2 = lerpRGB(A.sky[1], B.sky[1], et);
    var sky3 = lerpRGB(A.sky[2], B.sky[2], et);
    rootStyle.setProperty('--sky1', rgb(sky1));
    rootStyle.setProperty('--sky2', rgb(sky2));
    rootStyle.setProperty('--sky3', rgb(sky3));

    var sunOp = lerp(A.sun, B.sun, et);
    var moonOp = lerp(A.moon, B.moon, et);
    var starOp = lerp(A.stars, B.stars, et);
    if (sunWrapEl) sunWrapEl.style.opacity = sunOp.toFixed(3);
    if (moonEl) moonEl.style.opacity = moonOp.toFixed(3);
    if (starsEl) starsEl.style.opacity = starOp.toFixed(3);

    // moon rises as night deepens: arc across the top-right, dipping low near edges of night
    if (moonEl){
      var moonRise = moonOp; // 0 hidden, 1 high
      var mx = 70 - moonRise * 8;        // % from left
      var my = 30 - moonRise * 18;       // % from top (higher when risen)
      moonEl.style.left = mx + '%';
      moonEl.style.top = my + '%';
    }
  }

  function dayNightLoop(now){
    updateDayNight(now);
    requestAnimationFrame(dayNightLoop);
  }

  buildStars();
  requestAnimationFrame(dayNightLoop);

  measureStage();
  buildScrollLayers();
})();

</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
</script>
